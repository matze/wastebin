{% extends "base.html" %}
{% block content %}
<div class="flex-center">
  <div class="dialog">
    <div class="dialog-header">Burn after reading</div>
    <div class="dialog-section">
      Copy and send <a class="text-link" href="{{ path_prefix }}/{{ key }}">this link</a>.
      The recipient will be shown a confirmation prompt. The paste is deleted
      the moment they confirm.
    </div>
    <div class="dialog-section dialog-qr">
      <svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 {{ code.size() + 4 }} {{ code.size() + 4 }}" stroke="none">
        <rect width="100%" height="100%" fill="#ffffff"/>
        <path d="{% for (x, y) in self.dark_modules() %}M{{ x + 2 }},{{ y + 2 }}h1v1h-1z {% endfor %}" fill="#000000"/>
      </svg>
    </div>
  </div>
</div>
{% endblock %}
